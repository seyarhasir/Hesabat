name: hesabat
description: Hesabat — Afghanistan's First Offline-First Business Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Phase A foundation
  flutter_riverpod: ^2.6.1
  go_router: ^13.2.5
  supabase_flutter: ^2.5.0
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.1.5

  # Features
  mobile_scanner: ^7.0.0
  openfoodfacts: ^3.30.2
  dio: ^5.9.0
  url_launcher: ^6.2.6
  flutter_local_notifications: ^17.2.2
  pdf: ^3.10.8
  arabic_reshaper: ^0.0.1
  fl_chart: ^0.68.0
  image_picker: ^1.1.1
  csv: ^6.0.0

  # Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  intl: ^0.20.2
  path_provider: ^2.1.3
  share_plus: ^12.0.1

  # Environment
  flutter_dotenv: ^5.1.0

  # Persian Calendar support
  shamsi_date: ^1.0.0

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  # Assets
  assets:
    - .env
    - assets/images/
    - assets/fonts/

  # Localization
  generate: true

  # Fonts
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500

# Flutter Intl configuration
flutter_intl:
  enabled: true
  arb_dir: lib/shared/l10n
  template_arb_file: app_en.arb
  output_localization_file: app_localizations.dart
  output_class: AppLocalizations
  output_dir: lib/shared/l10n/generated

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/new-logo-transparent.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/new-logo-transparent.png"
  android: true
  ios: true
  fullscreen: false
