name: hesabat
description: Hesabat — Afghanistan's First Offline-First Business Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database (offline-first)
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlcipher_flutter_libs: ^0.5.4

  # Backend / sync
  supabase_flutter: ^2.5.0
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Features
  mobile_scanner: ^5.2.3
  openfoodfacts: ^3.30.2
  url_launcher: ^6.2.6
  flutter_local_notifications: ^17.2.2
  pdf: ^3.10.8
  fl_chart: ^0.68.0
  image_picker: ^1.1.1

  # Storage & security
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Navigation & UI
  go_router: ^13.2.5
  intl: ^0.20.2
  path_provider: ^2.1.3
  share_plus: ^12.0.1

  # Environment
  flutter_dotenv: ^5.1.0

  # Persian Calendar support
  shamsi_date: ^1.0.0

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.0

# Override to use sqlcipher instead of regular sqlite3
dependency_overrides:
  sqlite3_flutter_libs:
    path: ./custom_sqlcipher_override

flutter:
  uses-material-design: true

  # Assets
  assets:
    - .env
    - assets/images/
    - assets/fonts/

  # Localization
  generate: true

  # Fonts
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500

# Flutter Intl configuration
flutter_intl:
  enabled: true
  arb_dir: lib/shared/l10n
  template_arb_file: app_en.arb
  output_localization_file: app_localizations.dart
  output_class: AppLocalizations
  output_dir: lib/shared/l10n/generated
